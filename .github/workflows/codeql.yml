name: "CodeQL Security Analysis"

on:
  push:
    branches: [ main, staging, uat, production ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          config-file: .github/codeql/codeql-config.yml

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: |
          cd XiansAi.Server.Src
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        env:
          # Load the in-repo (unpublished) CodeQL model pack that declares the
          # LogSanitizer.* methods as taint barriers (see .github/codeql-models).
          # GitHub code scanning's `packs:` / `model-packs:` config keys only accept
          # *published* packs, so a local source pack must be put on the search path
          # (--additional-packs) and consumed (--model-packs) by injecting options
          # into the underlying `codeql database run-queries` invocation.
          CODEQL_ACTION_EXTRA_OPTIONS: '{"database":{"run-queries":["--additional-packs=${{ github.workspace }}/.github/codeql-models","--model-packs=xiansai/csharp-models"]}}'
        with:
          category: "/language:csharp"
